<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0050cb; /* Fallback */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
        }
        .pulse-line {
            stroke-dasharray: 100;
            animation: dash 2s linear infinite;
        }
        @keyframes dash {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }
        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

<script>
        // Simple Micro-interaction: Subtle entrance and mock redirect timing
        window.addEventListener('DOMContentLoaded', () => {
            const content = document.querySelector('.relative.z-10');
            content.style.opacity = '0';
            content.style.transform = 'translateY(20px) scale(0.95)';
            
            setTimeout(() => {
                content.style.transition = 'all 1.2s cubic-bezier(0.22, 1, 0.36, 1)';
                content.style.opacity = '1';
                content.style.transform = 'translateY(0) scale(1)';
            }, 300);

            // Simulate transition to onboarding after splash
            setTimeout(() => {
                window.location.href = 'onboarding.html';
            }, 3000);
        });
    </script>
